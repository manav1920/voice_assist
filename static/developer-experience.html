<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manasvi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="developer_experience_config.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #0b0c10;
      color: #f2f0ea;
    }

    #root {
      position: fixed;
      inset: 0;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #root.ready {
      opacity: 1;
    }

    #root.leaving {
      opacity: 0;
      transition: opacity 0.9s ease;
    }

    /* ---------------- Background ---------------- */

    .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--bg-from), var(--bg-via) 50%, var(--bg-to));
      overflow: hidden;
    }

    .bg .glow {
      position: absolute;
      width: 60vw;
      height: 60vw;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.8;
    }

    .bg .glow-1 {
      background: var(--glow-1);
      top: -15%;
      left: -10%;
      animation: drift-1 26s ease-in-out infinite;
    }

    .bg .glow-2 {
      background: var(--glow-2);
      bottom: -20%;
      right: -10%;
      animation: drift-2 32s ease-in-out infinite;
    }

    @keyframes drift-1 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(6%, 8%) scale(1.12);
      }
    }

    @keyframes drift-2 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(-6%, -6%) scale(1.15);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .bg .glow-1,
      .bg .glow-2 {
        animation: none;
      }
    }

    /* ---------------- Stage ---------------- */

    .stage {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;

      justify-content: center;

      padding: 40px 40px 80px;
    }

    .page {
      width: min(96vw, 1400px);
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .page.active {
      display: flex;
      animation: page-in 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes page-in {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .page-heading {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .page-heading strong{
    font-weight:700;
    color:var(--text-primary);
    }

    .lyric-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .lyric-card {
      width: 100%;

      min-height: 100px;

      display: flex;
      align-items: center;
      justify-content: center;

      background: rgba(255, 255, 255, .045);
      border: 1px solid rgba(255, 255, 255, .08);

      border-radius: 28px;

      padding: 18px 42px;

      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);

      box-shadow: 0 20px 50px rgba(0, 0, 0, .35);

      font-family: 'Fraunces', serif;
      font-weight: 600;

      font-size: clamp(18px, 2vw, 28px);

      line-height: 1.35;

      color: var(--text-primary);

      word-break: break-word;

      white-space: normal;

      opacity: 0;
      transform: translateY(16px) scale(.97);

      animation: lyric-in .7s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    @keyframes lyric-in {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ---------------- Music player ---------------- */

    .music-bar {
      margin-top: 34px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .music-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .music-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .music-btn:active {
      transform: scale(0.94);
    }

    .music-btn svg {
      width: 16px;
      height: 16px;
    }

    .play-music-cta {
      background: var(--accent);
      color: #14161d;
      font-weight: 600;
      font-size: 13.5px;
      border: none;
      border-radius: 100px;
      padding: 10px 20px;
      cursor: pointer;
      margin-top: 30px;
      transition: filter 0.15s ease;
    }

    .play-music-cta:hover {
      filter: brightness(1.08);
    }

    /* ---------------- Navigation ---------------- */

    .nav-row {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .nav-btn {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      border-radius: 100px;
      padding: 12px 26px;
      cursor: pointer;
      transition: filter 0.15s ease, transform 0.1s ease, border-color 0.2s ease;
    }

    .nav-btn:active {
      transform: translateY(1px);
    }

    .nav-btn.primary {
      background: var(--accent);
      color: #14161d;
      font-weight: 600;
      border: none;
    }

    .nav-btn.primary:hover {
      filter: brightness(1.08);
    }

    .nav-btn.ghost {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: var(--text-muted);
    }

    .nav-btn.ghost:hover {
      color: var(--text-primary);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .dots {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.3);
    }

    @media (prefers-reduced-motion: reduce) {
      .page.active {
        animation: none;
      }

      .lyric-card {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body>

  <div id="root">
    <div class="bg">
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
    </div>

    <div class="stage">

      <div id="pages-container"></div>

      <div class="music-bar" id="music-bar" style="display:none;"></div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <audio id="theme-audio" preload="auto"></audio>

  <script>
    const CFG = window.DEV_EXPERIENCE_CONFIG;
    const root = document.getElementById('root');
    let pages = [];
    const dotsEl = document.getElementById('dots');
    const audioEl = document.getElementById('theme-audio');

    let currentPage = 0;
    let musicStarted = false;

    // ---------------------------------------------------------------
    // Theme -> CSS variables
    // ---------------------------------------------------------------

    function applyTheme() {
      const t = CFG.theme;
      const style = document.documentElement.style;
      style.setProperty('--bg-from', t.bgFrom);
      style.setProperty('--bg-via', t.bgVia);
      style.setProperty('--bg-to', t.bgTo);
      style.setProperty('--glow-1', t.glow1);
      style.setProperty('--glow-2', t.glow2);
      style.setProperty('--accent', t.accent);
      style.setProperty('--text-primary', t.textPrimary);
      style.setProperty('--text-muted', t.textMuted);
    }

    // ---------------------------------------------------------------
    // Content from config
    // ---------------------------------------------------------------
    // One reusable template for every page: a small title, a stack of
    // lyric cards (one per string in `cards`), and a nav button. Nothing
    // about the layout differs between pages - only this content does.

    function buildPage(pageConfig, index, totalPages) {
      const page = document.createElement('div');
      page.className = 'page' + (index === 0 ? ' active' : '');
      page.dataset.page = index;

      const heading = document.createElement('div');
      heading.className = 'page-heading';
      heading.innerHTML = pageConfig.title;
      page.appendChild(heading);

      const stack = document.createElement('div');
      stack.className = 'lyric-stack';

      pageConfig.cards.forEach((line, i) => {
        const card = document.createElement('div');
        card.className = 'lyric-card';
        card.style.animationDelay = (i * 0.35) + 's';
        card.textContent = line;
        stack.appendChild(card);
      });

      page.appendChild(stack);

      const navRow = document.createElement('div');
      navRow.className = 'nav-row';

      if (index > 0) {
        const backBtn = document.createElement('button');
        backBtn.className = 'nav-btn ghost';
        backBtn.textContent = 'Back';
        backBtn.addEventListener('click', () => goToPage(index - 1));
        navRow.appendChild(backBtn);
      }

      const nextBtn = document.createElement('button');
      nextBtn.className = 'nav-btn primary';
      nextBtn.textContent = pageConfig.buttonText;

      const isLastPage = index === totalPages - 1;
      nextBtn.addEventListener('click', () => {
        if (isLastPage) {
          finishExperience();
        } else {
          goToPage(index + 1);
        }
      });

      navRow.appendChild(nextBtn);
      page.appendChild(navRow);

      return page;
    }

    function renderContent() {
      const container = document.getElementById('pages-container');
      container.innerHTML = '';

      CFG.pages.forEach((pageConfig, index) => {
        container.appendChild(buildPage(pageConfig, index, CFG.pages.length));
      });

      pages = Array.from(container.querySelectorAll('.page'));

      dotsEl.innerHTML = '';
      pages.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dotsEl.appendChild(dot);
      });
    }

    function finishExperience() {
      if (!audioEl.paused) audioEl.pause();
      root.classList.add('leaving');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 900);
    }

    // ---------------------------------------------------------------
    // Music player (works fine if CFG.music.src is null)
    // ---------------------------------------------------------------

    function setupMusic() {


      const bar = document.getElementById('music-bar');
      bar.style.display = 'flex';

      const playPauseBtn = document.createElement('button');
      playPauseBtn.className = 'music-btn';
      playPauseBtn.innerHTML = pauseIcon();
      bar.appendChild(playPauseBtn);

      const muteBtn = document.createElement('button');
      muteBtn.className = 'music-btn';
      muteBtn.innerHTML = volumeIcon();
      bar.appendChild(muteBtn);

      const replayBtn = document.createElement('button');
      replayBtn.className = 'music-btn';
      replayBtn.innerHTML = replayIcon();
      bar.appendChild(replayBtn);

      playPauseBtn.addEventListener('click', () => {
        if (audioEl.paused) {
          audioEl.play();
          playPauseBtn.innerHTML = pauseIcon();
        } else {
          audioEl.pause();
          playPauseBtn.innerHTML = playIcon();
        }
      });

      muteBtn.addEventListener('click', () => {
        audioEl.muted = !audioEl.muted;
        muteBtn.innerHTML = audioEl.muted ? mutedIcon() : volumeIcon();
      });

      replayBtn.addEventListener('click', () => {
        audioEl.currentTime = 0;
        audioEl.play();
      });


    }

    function showPlayMusicCta() {
      const stage = document.querySelector('.stage');
      const cta = document.createElement('button');
      cta.className = 'play-music-cta';
      cta.textContent = 'Play Music';
      cta.addEventListener('click', () => {
        audioEl.play();
        cta.remove();
      }, { once: true });
      pages[0].appendChild(cta);
    }

    function playIcon() { return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'; }
    function pauseIcon() { return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>'; }
    function volumeIcon() { return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3z"/></svg>'; }
    function mutedIcon() { return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12A4.5 4.5 0 0014 8v1.8l2.5 2.5c0-.1 0-.2 0-.3zM19 12c0 .9-.2 1.8-.5 2.6l1.5 1.5c.6-1.2 1-2.6 1-4.1 0-4.3-3-8-7-9v2c2.9.9 5 3.7 5 6.9zM4.3 3L3 4.3 7.7 9H3v6h4l5 5v-6.7l4.3 4.3c-.7.5-1.4.9-2.3 1.2v2c1.3-.3 2.5-.9 3.5-1.7l2 2 1.3-1.3L4.3 3zM12 4L9.9 6.1 12 8.2V4z"/></svg>'; }
    function replayIcon() { return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6H4c0 4.4 3.6 8 8 8s8-3.6 8-8-3.6-8-8-8z"/></svg>'; }

    // ---------------------------------------------------------------
    // Navigation
    // ---------------------------------------------------------------
    function playPageMusic(index) {

      const page = CFG.pages[index];

      if (!page.music) {

        audioEl.pause();

        return;

      }

      audioEl.src = page.music;

      audioEl.currentTime = 0;

      audioEl.play().catch(() => { });

    }

    function goToPage(index) {

      currentPage = index;

      pages.forEach((p, i) =>
        p.classList.toggle("active", i === index)
      );

      Array.from(dotsEl.children).forEach((d, i) =>
        d.classList.toggle("active", i === index)
      );

      playPageMusic(index);

    }
    // ---------------------------------------------------------------
    // Gate: only eligible users, only right after onboarding, never on refresh
    // ---------------------------------------------------------------

    const FLAG_KEY = 'manasvi_show_dev_experience';

    async function init() {
      if (window.location.search.includes("dev=true")) {

        applyTheme();
        renderContent();
        setupMusic();

        // Start first page music
        goToPage(0);

        requestAnimationFrame(() => root.classList.add("ready"));

        return;
      }
      const flagged = sessionStorage.getItem(FLAG_KEY) === 'true';
      sessionStorage.removeItem(FLAG_KEY); // consume immediately - refresh won't replay it

      if (!flagged) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const pubCfg = await fetch('/api/public-config').then(r => r.json());
        const sb = supabase.createClient(pubCfg.supabase_url, pubCfg.supabase_anon_key);
        const { data: { session } } = await sb.auth.getSession();

        if (!session) {
          window.location.href = 'auth.html';
          return;
        }

        const meRes = await fetch('/api/auth/me', {
          headers: { Authorization: 'Bearer ' + session.access_token },
        });

        if (!meRes.ok) {
          window.location.href = 'index.html';
          return;
        }

        const { user } = await meRes.json();
        const eligible = checkDevExperienceEligibility(user, session.user);

        if (!eligible) {
          window.location.href = 'index.html';
          return;
        }

      } catch (e) {
        window.location.href = 'index.html';
        return;
      }

      applyTheme();
      renderContent();
      setupMusic();

      requestAnimationFrame(() => root.classList.add('ready'));
    }

    // Matches on exact email first, falling back to name-based matching
    // for cases where the email isn't known yet. Name candidates come
    // from two places: the backend profile (`preferred_name`, chosen
    // during onboarding; `first_name`/`last_name`) and, as a fallback,
    // the Supabase auth session's own OAuth identity metadata
    // (`authUser.user_metadata`) - Google sign-in exposes the account's
    // given/full name there even when a value hasn't separately been
    // persisted to the backend profile. Kept identical in spirit to the
    // same check in onboarding.html.
   function checkDevExperienceEligibility(user, authUser) {

    const email = (user.email || '').trim().toLowerCase();
    const eligibleEmails = (CFG.eligibleEmails || []).map(e => e.trim().toLowerCase());

    if (eligibleEmails.includes(email)) {
        return true;
    }

    const preferredName = (user.preferred_name || '').trim().toLowerCase();
    const firstName = (user.first_name || '').trim().toLowerCase();
    const fullName = `${user.first_name || ''} ${user.last_name || ''}`.trim().toLowerCase();

    // OAuth-provider name fields (e.g. Google), read directly off the
    // Supabase session rather than the backend profile - covers
    // accounts where first_name/last_name weren't separately synced
    // to the `users` table.
    const metadata = (authUser && authUser.user_metadata) || {};
    const oauthFullName = (metadata.full_name || metadata.name || '').trim().toLowerCase();
    const oauthGivenName = (metadata.given_name || '').trim().toLowerCase();

    const eligibleNames = (CFG.eligibleNames || []).map(n => n.trim().toLowerCase());

    return (
        eligibleNames.includes(preferredName) ||
        eligibleNames.includes(firstName) ||
        eligibleNames.includes(fullName) ||
        eligibleNames.includes(oauthFullName) ||
        eligibleNames.includes(oauthGivenName)
    );
}

    init();
  </script>

</body>

</html>
